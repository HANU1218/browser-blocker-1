name: Build BrowserBlocker APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:   # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Checkout your code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 — Set up Java (Android needs Java 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3 — Cache Gradle to speed up future builds
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Step 4 — Give execute permission to gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Step 5 — Build the debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # Step 6 — Upload APK as downloadable artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BrowserBlocker-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30   # APK stays downloadable for 30 days
